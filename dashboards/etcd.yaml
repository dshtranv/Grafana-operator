kind: GrafanaDashboard
apiVersion: grafana.integreatly.org/v1beta1
metadata:
  name: etcd-dashboard
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: "openshift-metrics"
  json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": false,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "title": "etcd has leader",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "targets": [
            {
              "expr": "min by (cluster) (etcd_server_has_leader{cluster=~\"$cluster\"})",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              }
            }
          ],
          "description": "",
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          },
          "id": 1,
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 0
          }
        },
        {
          "title": "Leader changes",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "targets": [
            {
              "expr": "sum by (cluster) (rate(etcd_server_leader_changes_seen_total{cluster=~\"$cluster\"}[15m]))",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              }
            }
          ],
          "description": "",
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          },
          "id": 2,
          "gridPos": {
            "h": 7,
            "w": 12,
            "x": 6,
            "y": 0
          }
        },
        {
          "title": "Pending proposals",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "targets": [
            {
              "expr": "sum by (cluster) (etcd_server_proposals_pending{cluster=~\"$cluster\"})",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              }
            }
          ],
          "description": "",
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          },
          "id": 3,
          "gridPos": {
            "h": 7,
            "w": 12,
            "x": 0,
            "y": 7
          }
        },
        {
          "title": "Failed proposals",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "targets": [
            {
              "expr": "sum by (cluster) (rate(etcd_server_proposals_failed_total{cluster=~\"$cluster\"}[15m]))",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              }
            }
          ],
          "description": "",
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          },
          "id": 4,
          "gridPos": {
            "h": 7,
            "w": 12,
            "x": 12,
            "y": 7
          }
        },
        {
          "title": "WAL fsync p99",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum by (cluster, le) (rate(etcd_disk_wal_fsync_duration_seconds_bucket{cluster=~\"$cluster\"}[5m])))",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              }
            }
          ],
          "description": "",
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          },
          "id": 5,
          "gridPos": {
            "h": 7,
            "w": 12,
            "x": 0,
            "y": 14
          }
        },
        {
          "title": "etcd DB size",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "targets": [
            {
              "expr": "max by (cluster, instance) (etcd_mvcc_db_total_size_in_bytes{cluster=~\"$cluster\"})",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              }
            }
          ],
          "description": "",
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          },
          "id": 6,
          "gridPos": {
            "h": 7,
            "w": 12,
            "x": 12,
            "y": 14
          }
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": [
        "openshift",
        "etcd",
        "control-plane",
        "enterprise",
        "gitops",
        "generated"
      ],
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {
              "text": "Prometheus",
              "value": "prometheus"
            },
            "hide": 0,
            "label": "Prometheus datasource"
          },
          {
            "name": "loki_datasource",
            "type": "datasource",
            "query": "loki",
            "current": {
              "text": "Loki",
              "value": "loki"
            },
            "hide": 0,
            "label": "Loki datasource"
          },
          {
            "name": "tempo_datasource",
            "type": "datasource",
            "query": "tempo",
            "current": {
              "text": "Tempo",
              "value": "tempo"
            },
            "hide": 0,
            "label": "Tempo datasource"
          },
          {
            "name": "cluster",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "${datasource}"
            },
            "query": "label_values(kube_node_info, cluster)",
            "refresh": 1,
            "includeAll": true,
            "multi": false,
            "current": {
              "text": "All",
              "value": "$__all"
            }
          }
        ]
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timepicker": {
        "refresh_intervals": [
          "30s",
          "1m",
          "5m",
          "15m",
          "30m",
          "1h"
        ]
      },
      "timezone": "browser",
      "title": "OpenShift / Cluster / etcd",
      "uid": "openshiftclusteretcd",
      "version": 1,
      "weekStart": "",
      "description": "etcd quorum, proposal, disk latency, and DB size monitoring.\n\nGenerated dashboard. Validate metric names and labels in the target OpenShift/Grafana environment before production rollout."
    }