---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-dashboard-executive-platform-overview
  namespace: grafana
  labels:
    app.kubernetes.io/part-of: observability
    dashboards.grafana.io/category: 00-executive
spec:
  instanceSelector:
    matchLabels:
      dashboards: "openshift-metrics"
  folderRef: 00-executive
  uid: starter-exec-platform-overview
  resyncPeriod: 10m
  json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": false,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Firing critical/warning alerts",
          "description": "Current firing alerts by selected cluster scope",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 80
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ],
              "fields": ""
            },
            "orientation": "auto",
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "count(ALERTS{cluster=~\"$cluster\", alertstate=\"firing\", severity=~\"critical|warning\"})",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Degraded ClusterOperators",
          "description": "Any degraded OpenShift ClusterOperator requires platform review",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 80
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ],
              "fields": ""
            },
            "orientation": "auto",
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "sum(cluster_operator_conditions{cluster=~\"$cluster\", condition=\"Degraded\", status=\"True\"} == 1)",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Node readiness %",
          "description": "",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 80
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ],
              "fields": ""
            },
            "orientation": "auto",
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "100 * sum(kube_node_status_condition{cluster=~\"$cluster\",condition=\"Ready\",status=\"true\"} == 1) / count(kube_node_info{cluster=~\"$cluster\"})",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Pending/failed pods",
          "description": "",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 80
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ],
              "fields": ""
            },
            "orientation": "auto",
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "sum(kube_pod_status_phase{cluster=~\"$cluster\", phase=~\"Pending|Failed\"} == 1)",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Alerts by severity",
          "description": "Alert load by severity",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 7,
            "w": 8,
            "x": 8,
            "y": 7
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 80
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          },
          "targets": [
            {
              "expr": "count by (severity) (ALERTS{cluster=~\"$cluster\", alertstate=\"firing\"})",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "legendFormat": "{{severity}}"
            }
          ]
        },
        {
          "id": 6,
          "type": "bargauge",
          "title": "ClusterOperator degraded state",
          "description": "Which OpenShift operators are degraded",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 7,
            "w": 8,
            "x": 16,
            "y": 7
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 80
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          },
          "targets": [
            {
              "expr": "sum by (name) (cluster_operator_conditions{cluster=~\"$cluster\", condition=\"Degraded\", status=\"True\"} == 1)",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "legendFormat": "{{name}}"
            }
          ]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "CPU requested vs allocatable %",
          "description": "Capacity risk based on requested CPU",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 7,
            "w": 8,
            "x": 0,
            "y": 14
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 80
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          },
          "targets": [
            {
              "expr": "100 * sum(kube_pod_container_resource_requests{cluster=~\"$cluster\", resource=\"cpu\"}) / sum(kube_node_status_allocatable{cluster=~\"$cluster\", resource=\"cpu\"})",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            }
          ]
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Memory requested vs allocatable %",
          "description": "Capacity risk based on requested memory",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 7,
            "w": 8,
            "x": 8,
            "y": 14
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 80
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          },
          "targets": [
            {
              "expr": "100 * sum(kube_pod_container_resource_requests{cluster=~\"$cluster\", resource=\"memory\"}) / sum(kube_node_status_allocatable{cluster=~\"$cluster\", resource=\"memory\"})",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            }
          ]
        }
      ],
      "refresh": "5m",
      "schemaVersion": 39,
      "style": "dark",
      "tags": [
        "executive",
        "openshift",
        "health",
        "operator-managed",
        "starter"
      ],
      "templating": {
        "list": [
          {
            "name": "DS_PROMETHEUS",
            "type": "datasource",
            "query": "prometheus",
            "label": "Prometheus datasource",
            "current": {
              "text": "Prometheus",
              "value": "prometheus"
            },
            "hide": 0
          },
          {
            "name": "DS_LOKI",
            "type": "datasource",
            "query": "loki",
            "label": "Loki datasource",
            "current": {
              "text": "Loki",
              "value": "loki"
            },
            "hide": 0
          },
          {
            "name": "cluster",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "${DS_PROMETHEUS}"
            },
            "query": {
              "query": "label_values(kube_node_info, cluster)",
              "refId": "PrometheusVariableQueryEditor-VariableQuery"
            },
            "refresh": 1,
            "sort": 1,
            "multi": true,
            "includeAll": true,
            "allValue": ".*",
            "label": "Cluster",
            "current": {
              "text": "All",
              "value": "$__all"
            }
          }
        ]
      },
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "browser",
      "title": "Executive / Platform Overview",
      "uid": "starter-exec-platform-overview",
      "version": 1,
      "weekStart": "",
      "description": "Minimal executive view for OpenShift platform risk, health, and capacity."
    }
