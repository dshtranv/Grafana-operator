---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-dashboard-linux-nodes-and-capacity
  namespace: grafana
  labels:
    app.kubernetes.io/part-of: observability
    dashboards.grafana.io/category: 03-linux-and-nodes
spec:
  instanceSelector:
    matchLabels:
      dashboards: "openshift-metrics"
  folderRef: 03-linux-and-nodes
  uid: starter-linux-nodes-capacity
  resyncPeriod: 10m
  json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": false,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Ready nodes",
          "description": "",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 80
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ],
              "fields": ""
            },
            "orientation": "auto",
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "sum(kube_node_status_condition{cluster=~\"$cluster\", condition=\"Ready\", status=\"true\"} == 1)",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "NotReady nodes",
          "description": "",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 80
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ],
              "fields": ""
            },
            "orientation": "auto",
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "sum(kube_node_status_condition{cluster=~\"$cluster\", condition=\"Ready\", status!=\"true\"} == 1)",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "CPU request saturation %",
          "description": "",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 80
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ],
              "fields": ""
            },
            "orientation": "auto",
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "100 * sum(kube_pod_container_resource_requests{cluster=~\"$cluster\", resource=\"cpu\"}) / sum(kube_node_status_allocatable{cluster=~\"$cluster\", resource=\"cpu\"})",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Memory request saturation %",
          "description": "",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 80
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ],
              "fields": ""
            },
            "orientation": "auto",
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "100 * sum(kube_pod_container_resource_requests{cluster=~\"$cluster\", resource=\"memory\"}) / sum(kube_node_status_allocatable{cluster=~\"$cluster\", resource=\"memory\"})",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Node CPU usage %",
          "description": "Node CPU usage percentage",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 7,
            "w": 8,
            "x": 8,
            "y": 7
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 80
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          },
          "targets": [
            {
              "expr": "100 * (1 - avg by (instance) (rate(node_cpu_seconds_total{cluster=~\"$cluster\", mode=\"idle\"}[5m])))",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "legendFormat": "{{instance}}"
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Node memory usage %",
          "description": "Node memory usage percentage",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 7,
            "w": 8,
            "x": 16,
            "y": 7
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 80
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          },
          "targets": [
            {
              "expr": "100 * (1 - node_memory_MemAvailable_bytes{cluster=~\"$cluster\"} / node_memory_MemTotal_bytes{cluster=~\"$cluster\"})",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "legendFormat": "{{instance}}"
            }
          ]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Filesystem usage %",
          "description": "Filesystem usage; filtered noisy ephemeral paths",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 7,
            "w": 8,
            "x": 0,
            "y": 14
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 80
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          },
          "targets": [
            {
              "expr": "100 * (1 - node_filesystem_avail_bytes{cluster=~\"$cluster\", fstype!~\"tmpfs|overlay\", mountpoint!~\"/run.*|/var/lib/kubelet/pods.*\"} / node_filesystem_size_bytes{cluster=~\"$cluster\", fstype!~\"tmpfs|overlay\", mountpoint!~\"/run.*|/var/lib/kubelet/pods.*\"})",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "legendFormat": "{{instance}} {{mountpoint}}"
            }
          ]
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Network errors",
          "description": "Node network errors by device",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 7,
            "w": 8,
            "x": 8,
            "y": 14
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 80
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          },
          "targets": [
            {
              "expr": "sum by (instance, device) (rate(node_network_receive_errs_total{cluster=~\"$cluster\", device!~\"lo|veth.*|cali.*|ovn.*\"}[5m]) + rate(node_network_transmit_errs_total{cluster=~\"$cluster\", device!~\"lo|veth.*|cali.*|ovn.*\"}[5m]))",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "legendFormat": "{{instance}} {{device}}"
            }
          ]
        }
      ],
      "refresh": "1m",
      "schemaVersion": 39,
      "style": "dark",
      "tags": [
        "linux",
        "nodes",
        "capacity",
        "operator-managed",
        "starter"
      ],
      "templating": {
        "list": [
          {
            "name": "DS_PROMETHEUS",
            "type": "datasource",
            "query": "prometheus",
            "label": "Prometheus datasource",
            "current": {
              "text": "Prometheus",
              "value": "prometheus"
            },
            "hide": 0
          },
          {
            "name": "DS_LOKI",
            "type": "datasource",
            "query": "loki",
            "label": "Loki datasource",
            "current": {
              "text": "Loki",
              "value": "loki"
            },
            "hide": 0
          },
          {
            "name": "cluster",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "${DS_PROMETHEUS}"
            },
            "query": {
              "query": "label_values(kube_node_info, cluster)",
              "refId": "PrometheusVariableQueryEditor-VariableQuery"
            },
            "refresh": 1,
            "sort": 1,
            "multi": true,
            "includeAll": true,
            "allValue": ".*",
            "label": "Cluster",
            "current": {
              "text": "All",
              "value": "$__all"
            }
          },
          {
            "name": "node",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "${DS_PROMETHEUS}"
            },
            "query": {
              "query": "label_values(kube_node_info{cluster=~\"$cluster\"}, node)",
              "refId": "PrometheusVariableQueryEditor-VariableQuery"
            },
            "refresh": 1,
            "sort": 1,
            "multi": true,
            "includeAll": true,
            "allValue": ".*",
            "label": "Node",
            "current": {
              "text": "All",
              "value": "$__all"
            }
          }
        ]
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "browser",
      "title": "Linux / Nodes and Capacity",
      "uid": "starter-linux-nodes-capacity",
      "version": 1,
      "weekStart": "",
      "description": "Linux/RHCOS node health, filesystem, network errors, and cluster capacity saturation."
    }
