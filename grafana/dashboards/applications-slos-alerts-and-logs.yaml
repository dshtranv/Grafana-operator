---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-dashboard-applications-slos-alerts-and-logs
  namespace: grafana
  labels:
    app.kubernetes.io/part-of: observability
    dashboards.grafana.io/category: 06-applications-and-reliability
spec:
  instanceSelector:
    matchLabels:
      dashboards: "openshift-metrics"
  folderRef: 06-applications-reliability
  uid: starter-apps-slos-alerts-logs
  resyncPeriod: 10m
  json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": false,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "5xx error ratio %",
          "description": "",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 80
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ],
              "fields": ""
            },
            "orientation": "auto",
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "100 * sum(rate(http_requests_total{cluster=~\"$cluster\", namespace=~\"$namespace\", service=~\"$service\", status=~\"5..\"}[5m])) / sum(rate(http_requests_total{cluster=~\"$cluster\", namespace=~\"$namespace\", service=~\"$service\"}[5m]))",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "p95 latency seconds",
          "description": "",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 80
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ],
              "fields": ""
            },
            "orientation": "auto",
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{cluster=~\"$cluster\", namespace=~\"$namespace\", service=~\"$service\"}[5m])))",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "99.9% SLO burn rate",
          "description": "",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 80
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ],
              "fields": ""
            },
            "orientation": "auto",
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "(sum(rate(http_requests_total{cluster=~\"$cluster\", namespace=~\"$namespace\", service=~\"$service\", status=~\"5..\"}[5m])) / sum(rate(http_requests_total{cluster=~\"$cluster\", namespace=~\"$namespace\", service=~\"$service\"}[5m]))) / 0.001",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Firing app alerts",
          "description": "",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 80
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ],
              "fields": ""
            },
            "orientation": "auto",
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "count(ALERTS{cluster=~\"$cluster\", namespace=~\"$namespace\", alertstate=\"firing\"})",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Traffic by service",
          "description": "HTTP request rate. Requires standardized application metrics.",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 7,
            "w": 8,
            "x": 8,
            "y": 7
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 80
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          },
          "targets": [
            {
              "expr": "sum by (service) (rate(http_requests_total{cluster=~\"$cluster\", namespace=~\"$namespace\", service=~\"$service\"}[5m]))",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "legendFormat": "{{service}}"
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Error ratio by service",
          "description": "5xx error ratio by service",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 7,
            "w": 8,
            "x": 16,
            "y": 7
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 80
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          },
          "targets": [
            {
              "expr": "sum by (service) (rate(http_requests_total{cluster=~\"$cluster\", namespace=~\"$namespace\", service=~\"$service\", status=~\"5..\"}[5m])) / sum by (service) (rate(http_requests_total{cluster=~\"$cluster\", namespace=~\"$namespace\", service=~\"$service\"}[5m]))",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "legendFormat": "{{service}}"
            }
          ]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "p95 latency by service",
          "description": "p95 latency by service",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 7,
            "w": 8,
            "x": 0,
            "y": 14
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 80
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le, service) (rate(http_request_duration_seconds_bucket{cluster=~\"$cluster\", namespace=~\"$namespace\", service=~\"$service\"}[5m])))",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "legendFormat": "{{service}}"
            }
          ]
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "App pod restarts",
          "description": "Application pod restarts",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 7,
            "w": 8,
            "x": 8,
            "y": 14
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 80
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          },
          "targets": [
            {
              "expr": "sum by (namespace, pod) (increase(kube_pod_container_status_restarts_total{cluster=~\"$cluster\", namespace=~\"$namespace\"}[15m]))",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "legendFormat": "{{namespace}}/{{pod}}"
            }
          ]
        },
        {
          "id": 9,
          "type": "table",
          "title": "Firing application alerts",
          "description": "Application and namespace alerts",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 40
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 80
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "showHeader": true,
            "cellHeight": "sm"
          },
          "targets": [
            {
              "expr": "ALERTS{cluster=~\"$cluster\", namespace=~\"$namespace\", alertstate=\"firing\"}",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            }
          ]
        },
        {
          "id": 10,
          "type": "logs",
          "title": "Application error logs",
          "description": "Requires Loki. Use for incident triage and drill-down.",
          "datasource": {
            "type": "loki",
            "uid": "${DS_LOKI}"
          },
          "gridPos": {
            "h": 9,
            "w": 24,
            "x": 0,
            "y": 110
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 80
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "showTime": true,
            "showLabels": false,
            "wrapLogMessage": true,
            "dedupStrategy": "none"
          },
          "targets": [
            {
              "expr": "{cluster=~\"$cluster\", namespace=~\"$namespace\"} |~ \"ERROR|Error|error|Exception|panic|timeout|connection refused\"",
              "refId": "A",
              "datasource": {
                "type": "loki",
                "uid": "${DS_LOKI}"
              }
            }
          ]
        }
      ],
      "refresh": "1m",
      "schemaVersion": 39,
      "style": "dark",
      "tags": [
        "applications",
        "slo",
        "alerts",
        "logs",
        "operator-managed",
        "starter"
      ],
      "templating": {
        "list": [
          {
            "name": "DS_PROMETHEUS",
            "type": "datasource",
            "query": "prometheus",
            "label": "Prometheus datasource",
            "current": {
              "text": "Prometheus",
              "value": "prometheus"
            },
            "hide": 0
          },
          {
            "name": "DS_LOKI",
            "type": "datasource",
            "query": "loki",
            "label": "Loki datasource",
            "current": {
              "text": "Loki",
              "value": "loki"
            },
            "hide": 0
          },
          {
            "name": "cluster",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "${DS_PROMETHEUS}"
            },
            "query": {
              "query": "label_values(kube_node_info, cluster)",
              "refId": "PrometheusVariableQueryEditor-VariableQuery"
            },
            "refresh": 1,
            "sort": 1,
            "multi": true,
            "includeAll": true,
            "allValue": ".*",
            "label": "Cluster",
            "current": {
              "text": "All",
              "value": "$__all"
            }
          },
          {
            "name": "namespace",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "${DS_PROMETHEUS}"
            },
            "query": {
              "query": "label_values(kube_namespace_status_phase{cluster=~\"$cluster\"}, namespace)",
              "refId": "PrometheusVariableQueryEditor-VariableQuery"
            },
            "refresh": 1,
            "sort": 1,
            "multi": true,
            "includeAll": true,
            "allValue": ".*",
            "label": "Namespace",
            "current": {
              "text": "All",
              "value": "$__all"
            }
          },
          {
            "name": "service",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "${DS_PROMETHEUS}"
            },
            "query": {
              "query": "label_values(http_requests_total{cluster=~\"$cluster\", namespace=~\"$namespace\"}, service)",
              "refId": "PrometheusVariableQueryEditor-VariableQuery"
            },
            "refresh": 1,
            "sort": 1,
            "multi": true,
            "includeAll": true,
            "allValue": ".*",
            "label": "Service",
            "current": {
              "text": "All",
              "value": "$__all"
            }
          },
          {
            "name": "app",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "${DS_PROMETHEUS}"
            },
            "query": {
              "query": "label_values(kube_pod_labels{cluster=~\"$cluster\", namespace=~\"$namespace\"}, label_app_kubernetes_io_name)",
              "refId": "PrometheusVariableQueryEditor-VariableQuery"
            },
            "refresh": 1,
            "sort": 1,
            "multi": true,
            "includeAll": true,
            "allValue": ".*",
            "label": "App",
            "current": {
              "text": "All",
              "value": "$__all"
            }
          }
        ]
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "browser",
      "title": "Applications / SLOs Alerts and Logs",
      "uid": "starter-apps-slos-alerts-logs",
      "version": 1,
      "weekStart": "",
      "description": "Application golden signals, basic SLO burn rate, alerts, pod restarts, and error logs."
    }
